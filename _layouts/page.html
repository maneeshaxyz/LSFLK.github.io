---
layout: default
---
{%- assign page_slug = page.url | slugify -%}
<article class="post page-shell{% if page_slug != "" %} page-{{ page_slug }}{% endif %}">
  <header class="post-header">
    <h1 class="post-title">{{ page.title | escape }}</h1>
  </header>
  <div class="post-content">
    {{ content }}
  </div>
</article>
